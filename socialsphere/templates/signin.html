{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SocialSphere</title>

    <link href="{% static 'assets/images/favicon.png' %}" rel="icon">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<nav>
    <h2 class="logo">SocialSphere</h2>

    <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="#">Features</a>
        <a href="#">About</a>
    </div>

    <div class="auth">
        <button onclick="location.href='{% url 'signup' %}'">Register</button>
    </div>
</nav>

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <i class="fas fa-sign-in-alt"></i>
            <h2>Welcome Back</h2>
            <p>Login to continue</p>
        </div>

        <div id="messageBox" class="error-message"></div>

        <form id="loginForm">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="username" id="username"
                    placeholder="Username" required>
            </div>

            <!-- PASSWORD -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password"
                    placeholder="Password" required>
                <i class="fas fa-eye-slash toggle-password"
                    onclick="togglePassword('password')"></i>
            </div>

            <!-- CAPTCHA -->
            <div class="captcha-container">
                <div class="captcha-box">
                    <div id="captchaCode" class="captcha-code">A3F8G9H2</div>
                    <button type="button" class="refresh-captcha"
                        onclick="refreshCaptcha()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>

                <div class="input-group captcha-input">
                    <i class="fas fa-shield-alt"></i>
                    <input type="text" id="captchaInput"
                        placeholder="Enter CAPTCHA" required>
                </div>
            </div>

            <!-- OPTIONS -->
            <div class="form-options">
                <label class="checkbox-label">
                    <input type="checkbox"> Remember Me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" class="auth-btn">
                Login
            </button>

        </form>

        <div class="auth-footer">
            <p>Not registered?
                <a href="{% url 'signup' %}">Create account</a>
            </p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 SocialSphere</p>
</footer>

<script>

// Toggle password
function togglePassword(id) {
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// CAPTCHA refresh
function refreshCaptcha() {
    document.getElementById('captchaCode').innerText =
        Math.random().toString(36).substring(2, 10).toUpperCase();
}

// AJAX LOGIN
document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();

    const captchaInput = document.getElementById('captchaInput').value;
    const captchaCode = document.getElementById('captchaCode').innerText;

    if (captchaInput !== captchaCode) {
        showMessage("Invalid CAPTCHA", "error");
        refreshCaptcha();
        return;
    }

    fetch("{% url 'signin' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": document.querySelector('[name=csrfmiddlewaretoken]').value,
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            showMessage("Login successful!", "success");
            setTimeout(() => {
                window.location.href = "{% url 'home' %}";
            }, 1000);
        } else {
            showMessage("Invalid credentials", "error");
        }
    })
    .catch(() => {
        showMessage("Something went wrong", "error");
    });

});

// Message UI
function showMessage(msg, type) {
    const box = document.getElementById('messageBox');
    box.style.display = "block";
    box.innerText = msg;

    if (type === "success") {
        box.style.background = "#10b981";
    } else {
        box.style.background = "#ef4444";
    }
}

</script>

</body>
</html>
