{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In - Social Book</title>
</head>

<body>

<!-- HEADER -->
<div class="container">
    <h2>Social Book</h2>
    <a href="/signup/">Register</a>
</div>

<hr>

<!-- LOGIN SECTION -->
<div class="container">

    <h2>Log in</h2>

    <!-- ERROR MESSAGES -->
    {% for message in messages %}
        <p>{{message}}</p>
    {% endfor %}

    <!-- FORM -->
    <form method="POST">
        {% csrf_token %}

        <div>
            <input type="text" name="username" placeholder="Username">
        </div>

        <br>

        <div>
            <input type="password" name="password" placeholder="Password">
        </div>

        <br>

        <button type="submit">Login</button>

    </form>

    <br>

    <p>
        Not registered?
        <a href="/signup/">Create an account</a>
    </p>

</div>

<hr>

<!-- FOOTER -->
<div class="container">
    <a href="#">About</a> |
    <a href="#">Help</a> |
    <a href="#">Terms</a> |
    <a href="#">Privacy</a>

    <p>© Social Book</p>
</div>

</body>
</html>
