{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!--  NAVBAR -->
<div class="bg-white shadow p-4 flex justify-between items-center">

    <a href="{% url 'home' %}" class="text-xl font-bold">
        SocialSphere
    </a>

    <!-- SEARCH -->
    <form action="{% url 'search' %}" method="POST" class="flex gap-2">
        {% csrf_token %}
        <input type="text" name="username"
               placeholder="Search username..."
               class="px-4 py-2 border rounded-full w-64">
        <button class="bg-blue-500 text-white px-4 py-2 rounded-full">
            Search
        </button>
    </form>

    <!-- PROFILE -->
    <a href="{% url 'profile' request.user.username %}">
        <img src="{{user_profile.profileimage.url}}"
             class="w-10 h-10 rounded-full">
    </a>

</div>


<!-- SEARCH RESULTS -->
<div class="max-w-3xl mx-auto mt-6">

    <h2 class="text-lg font-semibold mb-4">
        Results for "{{username}}"
    </h2>

    {% if username_profile_list %}
    
        {% for users in username_profile_list %}
        <div class="bg-white p-4 rounded-xl shadow mb-4 flex items-center justify-between">

            <!-- LEFT SIDE -->
            <div class="flex items-center gap-4">

                <!-- PROFILE IMAGE (FIXED SIZE) -->
                <img src="{{users.profileimage.url}}"
                     class="w-14 h-14 rounded-full object-cover">

                <!-- USER INFO -->
                <div>
                    <a href="{% url 'profile' users.user %}"
                       class="font-bold text-sm">
                        @{{users.user}}
                    </a>

                    <p class="text-xs text-gray-500">
                        {{users.location}}
                    </p>

                    <p class="text-xs text-gray-600 truncate max-w-xs">
                        {{users.bio}}
                    </p>
                </div>

            </div>

            <!-- RIGHT BUTTON -->
            <a href="{% url 'profile' users.user %}"
               class="bg-blue-500 text-white px-4 py-1 rounded-lg text-sm">
                View
            </a>

        </div>
        {% endfor %}

    {% else %}
        <p class="text-gray-500 text-center mt-10">
            No users found 
        </p>
    {% endif %}

</div>

</body>
</html>
