{% extends 'home.html' %}

{% block title %}Search{% endblock %}

{% block content %}

<h2>Results for "{{username}}"</h2>

{% for users in username_profile_list %}
    <div class="container">
        <a href="/profile/{{users.user}}">
            <img src="{{users.profileimg.url}}" width="80">
        </a>

        <p>@{{users.user}}</p>
        <p>{{users.bio}}</p>
    </div>
    <hr>
{% endfor %}

{% endblock %}
